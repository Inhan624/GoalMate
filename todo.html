<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to do</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/pages/todo.css" />
  </head>
  <body>
    <nav>
      <ul>
        <a href="./index.html"><li class="home">홈</li></a>
        <a href="./todo.html"><li class="todo">To do</li></a>
        <a href="./calendar.html"><li class="calendar">캘린더</li></a>
        <a href="./goal.html"><li class="goal">목표</li></a>
        <a href="./login.html"><li class="login">로그인</li></a>
      </ul>
    </nav>
    <main>
      <div class="screen">
        <h2>To do</h2>
        <div class="progress">
          <h3>오늘 달성률</h3>
          <div id="progressText">0%</div>
        </div>
        <div class="addButton">
          <button id="openModalBtn">To Do 추가하기</button>
        </div>

        <div id="todoContainer"></div>

        <!-- 모달 -->
        <!-- 모달 -->
        <div id="todoModal" class="modal">
          <div class="modal-content">
            <h3 id="modalTitle">To Do 추가</h3>

            <!-- 수정할 Todo의 id 저장 -->
            <input type="hidden" id="editTodoId" />

            <label>To Do</label>

            <input
              type="text"
              id="todoInput"
              placeholder="할 일을 입력하세요"
            />

            <label>목표</label>

            <select id="goalSelect">
              <option value="">없음</option>
            </select>

            <label>중요도</label>

            <select name="importance" id="importance">
              <option value="none">없음</option>
              <option value="🔴">🔴</option>
              <option value="🟡">🟡</option>
              <option value="🟢">🟢</option>
            </select>

            <button id="saveTodo">저장</button>

            <button id="closeModalBtn">닫기</button>
          </div>
        </div>
      </div>
    </main>
    <script src="./js/todo.js"></script>
  </body>
</html>
